<div class="detail-body">
  <p>Engineered a custom RDP environment alongside a technical support vendor and built out a specialized POS system integrated with an IBM i backend. Designed a locked-down Windows IoT image for POS terminals to ensure secure transactions and system integrity. Configured real-time data sync between the POS systems and IBM i, and implemented strict security policies to minimize attack surfaces and meet compliance requirements. Updated the POS infrastructure to align with a new payment processing system and built a structured maintenance workflow to keep everything running long-term.</p>
